<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu de Mémoire - Chiffres et Prononciation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f2f2f2;
      padding: 20px;
    }
    h1 {
      margin-top: 20px;
      color: #333;
      text-align: center;
    }
    .score-board {
      display: flex;
      gap: 20px;
      margin: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .group {
      background-color: #fff;
      border: 2px solid #0077cc;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      transition: all 0.3s;
      min-width: 100px;
    }
    .group.active {
      background-color: #ffe082;
      font-weight: bold;
      transform: scale(1.05);
    }
    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-gap: 10px;
      margin-bottom: 20px;
    }
    .card {
      width: 100px;
      height: 100px;
      background-color: #0077cc;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: all 0.3s ease;
      position: relative;
      perspective: 1000px;
      transform-style: preserve-3d;
    }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      box-sizing: border-box;
    }
    .card-front {
      background-color: #0077cc;
      color: white;
      transform: rotateY(0deg);
    }
    .card-back {
      background-color: #ffcc00;
      color: #000;
      transform: rotateY(180deg);
      font-size: 12px;
      word-break: break-word;
      overflow: hidden;
    }
    .card.flipped {
      transform: rotateY(180deg);
    }
    .card.matched .card-back {
      background-color: #32cd32;
      color: white;
    }
    .controls {
      margin: 20px 0;
      display: flex;
      gap: 15px;
    }
    button {
      padding: 10px 20px;
      background-color: #0077cc;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #005fa3;
    }
    .timer {
      font-size: 18px;
      margin-bottom: 15px;
      font-weight: bold;
    }
    .game-info {
      margin-bottom: 20px;
      text-align: center;
      max-width: 500px;
      background-color: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    @media (max-width: 600px) {
      .game-board {
        grid-template-columns: repeat(3, 80px);
      }
      .card {
        width: 80px;
        height: 80px;
      }
      .card-back {
        font-size: 10px;
      }
      .score-board {
        gap: 10px;
      }
      .group {
        padding: 8px;
        min-width: 80px;
      }
    }
  </style>
</head>
<body>
  <h1>Mémoire des chiffres<br>Chiffres et Prononciation</h1>

  <div class="game-info">
    <p>Match each number with its French pronunciation. Click the 🔊 icon to hear the pronunciation.</p>
  </div>

  <div class="timer" id="timer">Time: 0s</div>

  <div class="score-board" id="scoreBoard">
    <div class="group" id="group1">Groupe 1 : <span>0</span></div>
    <div class="group" id="group2">Groupe 2 : <span>0</span></div>
    <div class="group" id="group3">Groupe 3 : <span>0</span></div>
    <div class="group" id="group4">Groupe 4 : <span>0</span></div>
  </div>

  <div class="game-board" id="gameBoard"></div>

  <div class="controls">
    <button id="newGameBtn">New Game</button>
    <button id="helpBtn">How to Play</button>
  </div>

  <script>
    const numberToPronunciation = {
      1: "uh(n)", 2: "duh", 3: "trwah", 4: "katr", 5: "sank",
      6: "sees", 7: "set", 8: "weet", 9: "nuhf", 10: "dees",
      11: "onz", 12: "dooz", 13: "trez", 14: "katorz", 15: "kanz",
      16: "sez", 17: "dees-set", 18: "dees-weet", 19: "dees-nuhf", 20: "vah(n)",
      30: "tront", 40: "karont", 50: "sank-ahnt", 60: "swah-sont", 70: "swah-sont-dees",
      80: "katr-vahn", 90: "katr-vahn-dees", 100: "sah(n)"
    };

    function convertToPronunciation(num) {
      if (numberToPronunciation[num]) return numberToPronunciation[num];
      if (num < 70) {
        const tens = Math.floor(num / 10) * 10;
        const units = num % 10;
        return numberToPronunciation[tens] + (units ? "-" + numberToPronunciation[units] : "");
      }
      if (num < 80) return "swah-sont-" + convertToPronunciation(num - 60);
      if (num < 100) return "katr-vahn" + (num % 20 ? "-" + convertToPronunciation(num % 20) : "");
      return "sah(n)";
    }

    function generateUniqueNumbers(count, min, max) {
      const numbers = new Set();
      while (numbers.size < count) {
        numbers.add(Math.floor(Math.random() * (max - min + 1)) + min);
      }
      return Array.from(numbers);
    }

    function speakFrench(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'fr-FR';
      speechSynthesis.speak(utterance);
    }

    const board = document.getElementById("gameBoard");
    let scores = [0, 0, 0, 0];
    let currentGroup = 0;
    let firstCard = null, secondCard = null, lock = false;
    let timerInterval;
    let seconds = 0;
    let matchesFound = 0;
    const totalPairs = 10;

    function startTimer() {
      clearInterval(timerInterval);
      seconds = 0;
      document.getElementById('timer').textContent = 'Time: 0s';
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = `Time: ${seconds}s`;
      }, 1000);
    }

    function updateScores() {
      for (let i = 0; i < 4; i++) {
        const groupEl = document.getElementById(`group${i+1}`);
        groupEl.querySelector("span").textContent = scores[i];
        groupEl.classList.toggle("active", i === currentGroup);
      }
    }

    function nextGroup() {
      currentGroup = (currentGroup + 1) % 4;
      updateScores();
    }

    function resetSelection() {
      firstCard = null;
      secondCard = null;
      lock = false;
    }

    function checkGameCompletion() {
      matchesFound++;
      if (matchesFound === totalPairs) {
        clearInterval(timerInterval);
        setTimeout(() => {
          alert(`Congratulations! You completed the game in ${seconds} seconds!\nFinal scores:\nGroup 1: ${scores[0]}\nGroup 2: ${scores[1]}\nGroup 3: ${scores[2]}\nGroup 4: ${scores[3]}`);
        }, 500);
      }
    }

    function flipCard() {
      if (lock || this.classList.contains("flipped") || this.classList.contains("matched")) return;

      this.classList.add("flipped");

      if (this.dataset.display === "🔊") {
        speakFrench(this.dataset.text.replace(/\(.*?\)/g, '').replace(/-/g, ' '));
      }

      if (!firstCard) {
        firstCard = this;
      } else {
        secondCard = this;
        lock = true;

        if (firstCard.dataset.text === secondCard.dataset.match) {
          setTimeout(() => {
            firstCard.classList.add("matched");
            secondCard.classList.add("matched");
            scores[currentGroup]++;
            updateScores();
            resetSelection();
            checkGameCompletion();
          }, 500);
        } else {
          setTimeout(() => {
            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");
            resetSelection();
            nextGroup();
          }, 1000);
        }
      }
    }

    function resetGame() {
      board.innerHTML = '';
      matchesFound = 0;
      scores = [0, 0, 0, 0];
      currentGroup = 0;
      
      const newNumbers = generateUniqueNumbers(totalPairs, 1, 100);
      const newCardsData = [];
      
      newNumbers.forEach(num => {
        newCardsData.push({ text: num.toString(), match: convertToPronunciation(num), display: num.toString() });
        newCardsData.push({ text: convertToPronunciation(num), match: num.toString(), display: "🔊" });
      });
      
      const selectedCards = newCardsData.sort(() => 0.5 - Math.random()).slice(0, totalPairs * 2);
      
      selectedCards.forEach(data => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.text = data.text;
        card.dataset.match = data.match;
        card.dataset.display = data.display;
        
        const cardFront = document.createElement("div");
        cardFront.className = "card-face card-front";
        cardFront.textContent = "?";
        
        const cardBack = document.createElement("div");
        cardBack.className = "card-face card-back";
        cardBack.textContent = data.display;
        
        card.appendChild(cardFront);
        card.appendChild(cardBack);
        
        card.addEventListener("click", flipCard);
        board.appendChild(card);
      });
      
      updateScores();
      startTimer();
    }

    // Initialize game
    document.getElementById('newGameBtn').addEventListener('click', resetGame);
    document.getElementById('helpBtn').addEventListener('click', () => {
      alert("How to Play:\n1. Click cards to flip them\n2. Match numbers with their French pronunciation\n3. The 🔊 icon plays the pronunciation\n4. Each match scores for your current group\n5. After a mismatch, play passes to the next group");
    });

    // Start first game
    resetGame();
  </script>
</body>
</html>
